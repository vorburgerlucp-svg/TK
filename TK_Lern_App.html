<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TK Lern-App – Technischer Kaufmann</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:rgba(0,0,0,0.09);
  --border2:rgba(0,0,0,0.18);--text:#1a1917;--text2:#6a6960;--text3:#9b9a92;
  --accent:#2348d4;--accent-bg:#eaeefc;--green:#1a7a4a;--green-bg:#e6f4ed;
  --red:#c23b2e;--red-bg:#fdecea;--amber:#8a5c00;--amber-bg:#fdf3d9;
  --r:10px;--rlg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;font-size:15px;background:var(--bg);color:var(--text)}

.wrap{display:flex;min-height:100vh}
.sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;padding:1.5rem 2rem 3rem;max-width:860px}
@media(max-width:660px){.sidebar{display:none}.main{padding:1rem}}

.logo{padding:1.25rem 1rem 0.75rem;font-size:13px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.logo em{color:var(--accent);font-style:normal}
.sec-label{padding:.75rem 1rem .2rem;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.nav-btn{display:flex;align-items:center;gap:9px;width:calc(100% - 12px);margin:1px 6px;padding:8px 10px;border:none;background:none;border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--text2);cursor:pointer;text-align:left;transition:background .1s,color .1s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.on{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav-btn svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.7}
.sidebar-foot{margin-top:auto;padding:1rem;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}

.page-h{font-size:22px;font-weight:600;margin-bottom:.2rem}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:1.25rem}
.panel{display:none}.panel.on{display:block}

.ctrls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.1rem}
select,input[type=text],input[type=date],input[type=number]{font-family:inherit;font-size:14px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);outline:none}
select:focus,input:focus{border-color:var(--accent)}
.btn{font-family:inherit;font-size:14px;padding:7px 16px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-weight:500;white-space:nowrap;transition:background .1s}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.98)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{background:#1e3eb8}
.btn-sm{font-size:12px;padding:4px 10px}
.btn-del{background:var(--red);color:#fff;border-color:var(--red)}.btn-del:hover{background:#a83227}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:1.25rem 1.5rem;margin-bottom:1rem}

/* ===== LESEN – neue strukturierte Darstellung ===== */
.lese-pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;background:var(--accent-bg);color:var(--accent);margin-bottom:1rem}
.lese-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;margin-bottom:1rem}
.lese-section{padding:.9rem 1.4rem;border-bottom:1px solid var(--border)}
.lese-section:last-child{border-bottom:none}
.lese-section-head{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.lese-section-head::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:2px;flex-shrink:0}
.lese-text{font-size:14px;line-height:1.75;color:var(--text)}
.lese-list{list-style:none;display:flex;flex-direction:column;gap:4px;margin-top:4px}
.lese-list li{font-size:14px;line-height:1.65;color:var(--text);padding-left:1.2rem;position:relative}
.lese-list li::before{content:'·';position:absolute;left:0;color:var(--accent);font-weight:600}
.lese-sublist{list-style:none;margin-top:4px;margin-left:1.2rem}
.lese-sublist li{font-size:13px;color:var(--text2);padding-left:1rem;position:relative;line-height:1.6}
.lese-sublist li::before{content:'–';position:absolute;left:0;color:var(--text3)}
.lese-kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;margin-top:4px}
.lese-key{font-size:13px;font-weight:500;color:var(--text);padding:3px 0}
.lese-val{font-size:13px;color:var(--text2);padding:3px 0;border-bottom:1px solid var(--border)}
.lese-key:last-of-type,.lese-val:last-of-type{border-bottom:none}
.lese-merksatz{background:var(--accent-bg);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:.75rem 1rem;font-size:14px;color:var(--accent);font-weight:500;margin-top:.5rem;line-height:1.6}
.lese-formula{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:.6rem 1rem;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text);display:inline-block;margin-top:4px}
.lese-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.lese-table th{text-align:left;padding:6px 10px;background:var(--surface2);font-weight:600;font-size:12px;border-bottom:1px solid var(--border)}
.lese-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.lese-table tr:last-child td{border-bottom:none}
.lese-tag{display:inline-block;font-size:11px;font-weight:500;padding:1px 7px;border-radius:20px;background:var(--amber-bg);color:var(--amber);margin-right:4px}

/* PROGRESS */
.prog-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:1.2rem;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* FLIP */
.flip-outer{perspective:1200px;margin-bottom:1rem}
.flip-card{width:100%;min-height:195px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.4,.2,.2,1)}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-f,.flip-b{position:absolute;width:100%;min-height:195px;backface-visibility:hidden;border-radius:var(--rlg);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1.75rem;background:var(--surface)}
.flip-b{transform:rotateY(180deg);background:var(--accent-bg)}
.flip-tag{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem}
.flip-b .flip-tag{color:var(--accent)}
.flip-q{font-size:16px;font-weight:500;line-height:1.5}
.flip-a{font-size:14px;line-height:1.65}
.flip-hint{font-size:12px;color:var(--text3);margin-top:.75rem}
.card-nav{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-ctr{font-size:13px;color:var(--text3);font-variant-numeric:tabular-nums}

/* QUIZ */
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;flex-wrap:wrap;gap:6px}
.qbadge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.qbadge-mc{background:var(--accent-bg);color:var(--accent)}
.qbadge-tf{background:var(--amber-bg);color:var(--amber)}
.q-text{font-size:16px;font-weight:500;line-height:1.55;margin-bottom:1.1rem}
.opt{width:100%;text-align:left;padding:11px 14px;border-radius:var(--r);border:1px solid var(--border2);font-size:14px;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--text);margin-bottom:7px;line-height:1.5;transition:background .1s,border-color .1s}
.opt:hover:not(:disabled){background:var(--surface2);border-color:var(--accent)}
.opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:500}
.opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.opt:disabled{cursor:default}
.fb{margin-top:.75rem;padding:9px 13px;border-radius:var(--r);font-size:13px;font-weight:500}
.fb-ok{background:var(--green-bg);color:var(--green)}.fb-nok{background:var(--red-bg);color:var(--red)}

/* RESULT */
.res-center{text-align:center;padding:2rem 1rem}
.res-ring{width:96px;height:96px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:26px;font-weight:600;color:var(--accent)}
.res-label{font-size:18px;font-weight:600;margin-bottom:.25rem}
.res-sub{font-size:14px;color:var(--text2);margin-bottom:1.25rem}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-box{background:var(--surface2);border-radius:var(--r);padding:12px;text-align:center}
.stat-n{font-size:22px;font-weight:600}.stat-l{font-size:12px;color:var(--text2);margin-top:2px}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

/* PRÜFUNGEN */
.p-form{display:flex;flex-direction:column;gap:10px}
.p-form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.p-label{font-size:13px;font-weight:500;color:var(--text2);min-width:90px}
.thema-checks{display:flex;flex-wrap:wrap;gap:7px}
.tc{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--border2);border-radius:20px;font-size:13px;cursor:pointer;background:var(--surface);color:var(--text);transition:background .1s,border-color .1s;user-select:none}
.tc.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:500}
.tc input{display:none}
.p-list{display:flex;flex-direction:column;gap:9px}
.p-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.p-datebox{min-width:50px;text-align:center;background:var(--accent-bg);border-radius:var(--r);padding:6px 8px;flex-shrink:0}
.p-day{font-size:20px;font-weight:600;color:var(--accent);line-height:1}
.p-mon{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--accent);letter-spacing:.06em}
.p-info{flex:1;min-width:120px}.p-title{font-weight:600;font-size:15px}.p-meta{font-size:12px;color:var(--text2);margin-top:2px}
.p-cdown{font-size:12px;font-weight:500;color:var(--text3);white-space:nowrap}.cdown-hot{color:var(--red)}
.p-acts{display:flex;gap:6px;flex-wrap:wrap}

/* EXAM */
.exam-hdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:1rem 1.5rem;margin-bottom:1.1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.exam-title{font-weight:600;font-size:15px}.exam-meta{font-size:12px;color:var(--text2)}
.exam-timer{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:500;color:var(--accent)}
.scenario{background:#fafaf7;border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:1rem 1.2rem;margin-bottom:1.1rem;font-size:14px;line-height:1.7;color:var(--text2)}
.scenario-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.35rem}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:14px}
.wrong-item{font-size:13px;padding:7px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.wrong-item strong{color:var(--text)}.wrong-item .corr{color:var(--green)}
</style>
</head>
<body>
<div class="wrap">
<aside class="sidebar">
  <div class="logo">TK <em>Lern</em>-App</div>
  <div class="sec-label">Lernen</div>
  <button class="nav-btn on" onclick="go('lesen')">
    <svg viewBox="0 0 20 20"><rect x="3" y="4" width="14" height="12" rx="2"/><line x1="6" y1="8" x2="14" y2="8"/><line x1="6" y1="11" x2="11" y2="11"/></svg>Lesen
  </button>
  <button class="nav-btn" onclick="go('karten')">
    <svg viewBox="0 0 20 20"><rect x="2" y="6" width="13" height="9" rx="2"/><rect x="5" y="4" width="13" height="9" rx="2" opacity=".45"/></svg>Lernkarten
  </button>
  <button class="nav-btn" onclick="go('quiz')">
    <svg viewBox="0 0 20 20"><path d="M10 4a6 6 0 100 12A6 6 0 0010 4z"/><path d="M8.5 8a1.5 1.5 0 113 0c0 1-1.5 1.5-1.5 2.5"/><circle cx="10" cy="13.5" r=".75" fill="currentColor" stroke="none"/></svg>Quiz
  </button>
  <div class="sec-label">Prüfungen</div>
  <button class="nav-btn" onclick="go('pruef')">
    <svg viewBox="0 0 20 20"><rect x="4" y="2" width="12" height="16" rx="2"/><line x1="7" y1="7" x2="13" y2="7"/><line x1="7" y1="10" x2="13" y2="10"/><line x1="7" y1="13" x2="10" y2="13"/></svg>Prüfungsplaner
  </button>
  <div class="sidebar-foot">Technischer Kaufmann</div>
</aside>
<main class="main">

<div id="p-lesen" class="panel on">
  <div class="page-h">Lernstoff lesen</div>
  <div class="page-sub">Thema und Block wählen</div>
  <div class="ctrls">
    <select id="ls-thema" onchange="loadLeseBlocks()"></select>
    <select id="ls-block" style="max-width:340px" onchange="renderLesen()"></select>
  </div>
  <div id="ls-out"></div>
</div>

<div id="p-karten" class="panel">
  <div class="page-h">Lernkarten</div>
  <div class="page-sub">Tippe auf die Karte zum Umdrehen</div>
  <div class="ctrls">
    <select id="k-thema"></select>
    <button class="btn btn-p" onclick="startK()">Starten</button>
    <button class="btn" onclick="shuffleK()">Mischen</button>
  </div>
  <div id="k-out"></div>
</div>

<div id="p-quiz" class="panel">
  <div class="page-h">Quiz</div>
  <div class="page-sub">Multiple Choice &amp; Wahr/Falsch — kein Schreiben</div>
  <div class="ctrls">
    <select id="q-thema"></select>
    <select id="q-n"><option value="10">10 Fragen</option><option value="20">20 Fragen</option><option value="30">30 Fragen</option><option value="999">Alle</option></select>
    <button class="btn btn-p" onclick="startQ()">Quiz starten</button>
  </div>
  <div id="q-out"></div>
</div>

<div id="p-pruef" class="panel">
  <div class="page-h">Prüfungsplaner</div>
  <div class="page-sub">Prüfungen planen und simulieren</div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:.9rem">Neue Prüfung erstellen</div>
    <div class="p-form">
      <div class="p-form-row"><span class="p-label">Bezeichnung</span><input type="text" id="pn-name" placeholder="z.B. Prüfung Marketing" style="flex:1;min-width:180px"></div>
      <div class="p-form-row"><span class="p-label">Datum</span><input type="date" id="pn-dat"><select id="pn-n" style="max-width:130px"><option value="20">20 Fragen</option><option value="30">30 Fragen</option><option value="50">50 Fragen</option></select></div>
      <div class="p-form-row" style="align-items:flex-start"><span class="p-label" style="padding-top:6px">Themen</span><div class="thema-checks" id="tc-wrap"></div></div>
      <div><button class="btn btn-p" onclick="saveP()">Prüfung speichern</button></div>
    </div>
  </div>
  <div style="font-size:14px;font-weight:600;margin-bottom:.75rem">Geplante Prüfungen</div>
  <div class="p-list" id="p-list"></div>
</div>

<div id="p-exam" class="panel"><div id="exam-out"></div></div>
</main>
</div>

<script>
const DATA = [{"id":"m1","thema":"Marketing","block":"Block 1 – 10.12.2025","titel":"Grundlagen & Aufgaben","inhalt":"Definition: Marketing = konsequente Ausrichtung des Unternehmens an den Bedürfnissen des Marktes. Ziel: Kundenbedürfnisse erkennen, passende Leistungen anbieten, Wettbewerbsvorteile sichern.\n\nAufgaben des Marketings:\n- Marktforschung: Bedürfnisse, Trends und Konkurrenz analysieren\n- Produktentwicklung: Produkte gemäss Kundenbedürfnissen gestalten\n- Markterschliessung: Einführung am Markt (Preis, Kommunikation, Vertrieb)\n- Kundenpflege: Kundenbindung, Service, Zufriedenheitsmanagement\n- Positionierung: Aufbau eines klaren, unterscheidbaren Markenbildes\n\nMarketingsystem: Unternehmen + Konkurrenz + Kunden + Umweltfaktoren.\n\nMarktgrössen:\n- Marktkapazität: theoretische Maximalmenge ohne Kaufkraft\n- Marktpotenzial: maximal mögliche Nachfrage (Bedürfnisse + Kaufkraft)\n- Marktvolumen: effektiv verkaufte Menge\n- Marktanteil: Anteil eines Unternehmens am Marktvolumen\n- Marktsättigungsgrad = Marktvolumen / Marktpotenzial × 100%\n\nMarktsegmentierung:\n- Geografisch: Region, Stadt, Land\n- Demografisch: Alter, Geschlecht, Einkommen\n- Psychografisch: Lifestyle, Werte, Persönlichkeit\n- Verhaltensorientiert: Vielnutzer, Gelegenheitskäufer\n\nUSP = Unique Selling Proposition (objektiver Alleinstellungsvorteil)\nUAP = Unique Advertising Proposition (emotionaler Werbevorteil)\n\nCustomer Journey: Awareness → Consideration → Evaluation → Purchase → Use → Loyalty\n\nLeitbild → Unternehmensstrategie → Marketingkonzept"},{"id":"m2","thema":"Marketing","block":"Block 2 – 17.12.2025","titel":"Strategische Grundbegriffe & Marktforschung","inhalt":"SGF = Strategische Geschäftsfelder: abgrenzbare Marktbereiche, Kombination aus Kundengruppe + Produkt/Nutzen + Technologie. Zweck: strategische Planung, Ressourcenallokation.\nSGE = Strategische Geschäftseinheiten: Organisationseinheiten innerhalb eines SGF. Eigene Markt- und Wettbewerbsstrategie.\nSEP = Strategische Erfolgspositionen: nachhaltige Wettbewerbsvorteile (Qualität, Preisführerschaft, Innovation, Service, Marke).\nMerkhilfe: SGF = Marktbereich (WAS?), SGE = Organisationseinheit (WER?), SEP = Wettbewerbsvorteil (WOMIT gewinnen wir?)\n\nMarktforschung:\n- Primärforschung: Eigene Datenerhebung – aktuell, spezifisch, teuer\n- Sekundärforschung: Nutzung vorhandener Daten – schnell, günstig, allgemein\n- Interne Quellen: Verkaufsstatistiken, CRM, Reklamationen, Buchhaltung\n- Externe Quellen: Statistische Ämter, Branchenverbände, Studien\n\nErhebungsmethoden:\n- Qualitativ: Tiefeninterviews, Fokusgruppen, Beobachtungen → Motive, Meinungen\n- Quantitativ: Standardisierte Umfragen, grosse Stichproben → Messbarkeit\n\nFragearten: Offene Fragen, Einfachauswahl, Mehrfachauswahl, Skalenfragen (Likert), Suggestivfragen (VERBOTEN!)\n\n7-Schritte-Ablauf: Problemdefinition → Zielsetzung → Forschungsdesign → Datenerhebung planen → Datensammlung → Datenanalyse → Interpretation und Präsentation\n\nDatenschutz DSG/DSGVO: Freiwilligkeit, Transparenz, Zweckbindung, Anonymität, keine Täuschung."},{"id":"m3","thema":"Marketing","block":"Block 3 – 05.01.2026","titel":"Marketingkonzept, Analyse-Tools & Strategien","inhalt":"Marketingkonzept Aufbau A-Z-S-U-B-K:\nAnalyse → Ziele → Strategie → Umsetzung (Mix) → Budget → Kontrolle\n\nPESTEL: Makroumfeld (extern, nicht beeinflussbar):\nP = Political (Gesetze, Subventionen)\nE = Economic (Kaufkraft, Inflation, Konjunktur)\nS = Social (Demografie, Wertewandel)\nT = Technological (Digitalisierung, Innovation)\nE = Ecological (Nachhaltigkeit, Umweltauflagen)\nL = Legal (Arbeitsrecht, Datenschutz)\n\nSWOT: Intern (Stärken/Schwächen) + Extern (Chancen/Risiken).\nSO = Angriffsstrategie, WO = Aufholstrategie, ST = Verteidigungsstrategie, WT = Rückzug.\nIntern = Stärken & Schwächen (beeinflussbar). Extern = Chancen & Risiken (nicht beeinflussbar).\n\nFive Forces Porter: neue Anbieter, Kundenmacht, Lieferantenmacht, Ersatzprodukte, Wettbewerbsintensität.\n\nAnsoff-Matrix:\n- Bestehend/Bestehend = Marktdurchdringung (geringstes Risiko)\n- Bestehend/Neu = Produktentwicklung (mittleres Risiko)\n- Neu/Bestehend = Marktentwicklung (mittleres Risiko)\n- Neu/Neu = Diversifikation (höchstes Risiko)\n\nPorter Wettbewerbsstrategien:\n- Kostenführerschaft: günstigster Anbieter im Gesamtmarkt\n- Differenzierung: einzigartiges Angebot, Mehrpreis gerechtfertigt\n- Fokus/Nische: Spezialisierung auf ein Segment\n\nPreisstrategien: Hochpreis-, Niedrigpreis-, Mittelpreisstrategie. Skimming (hoch→niedrig) vs. Penetration (niedrig→höher).\n\nDistribution: Intensiv / Selektiv / Exklusiv.\nPush-Prinzip: Hersteller → Handel → Kunde.\nPull-Prinzip: Hersteller → Kunde → Handel (Werbung, Markenaufbau)."},{"id":"m4","thema":"Marketing","block":"Block 4 – 02.03.2026","titel":"Marketing-Mix, Produktpolitik & Preispolitik","inhalt":"Marketing-Mix = operative Umsetzung der Strategie.\n\n4P klassisch:\n- Product: Qualität, Design, Marke, Garantie, Service, Verpackung\n- Price: Preishöhe, Rabatte, Zahlungsbedingungen\n- Place: Vertriebskanäle, Standort, Logistik, Online-Shop\n- Promotion: Werbung, PR, Social Media, Messen, Sponsoring\n\n7P für Dienstleistungen: 4P + People + Process + Physical Evidence\n\nProduktdimensionen:\n- Kernprodukt: Grundnutzen (WOZU?)\n- Formales Produkt: Eigenschaften, Qualität, Design, Marke\n- Erweitertes Produkt: Garantie, Lieferung, Schulung, Installation\n\nProduktlebenszyklus:\n- Entwicklung: Kosten hoch, kein Umsatz\n- Einführung: geringe Nachfrage, Bekanntheit aufbauen\n- Wachstum: steigender Absatz, Marktanteil erhöhen\n- Reife: starker Wettbewerb, Gewinn maximieren\n- Sättigung: stagnierend, Relaunch prüfen\n- Rückgang: Ausstieg oder Relaunch\n\nSortimentsbreite = Anzahl Produktlinien. Sortimentstiefe = Varianten pro Produkt.\n\nPreispolitik 4K:\n- Konsument: Zahlungsbereitschaft = oberste Preisgrenze\n- Kosten: Herstellungskosten = unterste Preisgrenze\n- Konkurrenz: Marktpreis = Orientierungspunkt\n- Kapazität: Auslastung bestimmt kurzfristigen Mindestpreis\n\nZielkonflikte: Preis vs. Qualität, Gewinn vs. Marktanteil, kurzfristig vs. langfristig."},{"id":"m5","thema":"Marketing","block":"Block 5 – Customer Journey","titel":"Customer Journey – 6 Phasen","inhalt":"Customer Journey = Weg des Kunden vom ersten Problembewusstsein bis zur treuen Weiterempfehlung.\n\nPhase 1 Awareness: Kunde erkennt Problem, weiss noch nichts vom Unternehmen. Aufgabe: sichtbar sein (Google, Werbung, Social Media, Empfehlungen).\nPhase 2 Consideration: Kunde sucht aktiv Lösungen, vergleicht Anbieter. Aufgabe: überzeugen ohne zu verkaufen (Website, Referenzen, schnelle Reaktion).\nPhase 3 Evaluation: Kunde hat 2-3 Favoriten, sucht Vertrauen. Aufgabe: Vertrauen aufbauen (persönliches Gespräch, Referenzprojekte).\nPhase 4 Purchase: Kunde entscheidet sich, Vertrag/Auftragsbestätigung. Aufgabe: klare Kommunikation, gutes Gefühl bestätigen.\nPhase 5 Use: Leistungserbringung = Moment der Wahrheit. Aufgabe: Qualität liefern, Termine halten.\nPhase 6 Loyalty: Kunde begeistert, kommt wieder, empfiehlt weiter = Botschafter. Aufgabe: Nachbetreuung, Dankbarkeit, Google-Rezension.\n\nLoyaler Kunde: kommt wieder (ohne Akquise) + empfiehlt weiter (ohne Werbekosten) + vertraut schneller."},{"id":"pl1","thema":"Problemlösung","block":"11.03.2026","titel":"AZPERK – Strukturierter Problemlösungsprozess","inhalt":"Problem = Soll – Ist (Differenz = Problem)\n\nAZPERK Prozess:\nA = Analyse: Problem verstehen (IST-Zustand)\nZ = Ziel: Soll-Zustand definieren (SMART!)\nP = Planung: Lösungen entwickeln\nE = Entscheidung: Beste Lösung auswählen\nR = Realisation: Umsetzung\nK = Kontrolle: Erfolg prüfen\n\nSMART-Ziele:\nS = Spezifisch: klar formuliert\nM = Messbar: überprüfbar\nA = Attraktiv: motivierend\nR = Realistisch: erreichbar\nT = Terminiert: Zeitrahmen gesetzt\n\nProblemanalyse Methoden:\n1. Abweichungsanalyse: Problem = Soll – Ist\n2. Ishikawa (Ursache-Wirkungs-Diagramm) 6M-Modell: Mensch, Maschine, Material, Methode, Milieu, Messung\n3. Ergebnisbaumanalyse: Problem → Ursachen → Unterursachen\n\nVernetztes Denken: Zusammenhänge erkennen, Dynamiken verstehen, Wechselwirkungen sehen, Unsicherheit akzeptieren.\n\nEisenhower-Matrix:\n- Wichtig + Dringend = Sofort machen\n- Wichtig + nicht dringend = Planen\n- Unwichtig + Dringend = Delegieren\n- Unwichtig + nicht dringend = Ignorieren\n\nPareto-Prinzip 80/20: 80% Wirkung durch 20% Ursachen. Fokus auf kritische wenige.\n\nABC-Analyse: A = sehr wichtig, B = mittel, C = wenig wichtig.\n\nKreativitätstechniken: Brainstorming, Mindmap, Morphologischer Kasten.\n\nEntscheidungstechniken:\n- Nutzwertanalyse: Kriterien gewichten + Optionen bewerten → objektive Entscheidung\n- Präferenzmatrix: Paarvergleich von Alternativen\n\nSzenariotechnik: Trend-Szenario (wahrscheinlich), Worst Case (Risiko), Best Case (optimistisch).\n\nWichtige Denkprinzipien: Ursache ≠ Symptom, systematisch vorgehen, ganzheitlich denken."},{"id":"pm1","thema":"Projektmanagement","block":"Block 1 – 28.10.2025","titel":"Grundlagen, Merkmale & Phasenkonzept","inhalt":"6 Projektmerkmale:\n- Einmaligkeit: kein Routineprozess\n- Klares Ziel: Sach-, Zeit- und Kostenziel\n- Zeitliche Begrenzung: definierter Start und Abschluss\n- Begrenzte Ressourcen: Geld, Zeit, Personal\n- Eigene Organisation: Projektleitung, Projektteam\n- Komplexität/Risiko: mehrere Beteiligte, Unsicherheiten\n\n7 PM-Komponenten: Ziele, Aufgaben/Inhalte, Organisation, Zeit, Kosten, Qualität, Risiken & Kommunikation.\n\nErfolgsfaktoren: klare Ziele, eindeutiger Projektauftrag, Unterstützung Auftraggeber, kompetente Projektleitung, gute Kommunikation, realistische Planung, motiviertes Team, laufendes Controlling.\n\nBasis-Phasenkonzept:\n1. Startphase\n2. Planungsphase\n3. Realisierungsphase\n4. Abschlussphase\n\nPlanungsphase: Ziele präzisieren → PSP → Aufgaben/Verantwortlichkeiten → Termin-/Meilensteinplan → Ressourcen → Kosten → Risikoanalyse → Kommunikationsplanung.\n\nProjektantrag → Projektauftrag (verbindlich: Ziele, Termine, Budget) → Projektfreigabe → Projektstart (Kick-off).\n\nSMART-Ziele: spezifisch, messbar, erreichbar, realistisch, terminiert.\n- Wirtschaftliche Ziele: Budget, Nutzen, Effizienz\n- Leistungsziele: Ergebnis, Qualität, Termine\n- Personelle Ziele: Zusammenarbeit, Motivation, Rollen"},{"id":"pm2","thema":"Projektmanagement","block":"Block 2 – 26.11.2025","titel":"Projektstrukturplan, Ressourcen- & Kostenplanung","inhalt":"Projektstrukturplan PSP: Projekt → Teilprojekte → Arbeitspakete.\nArbeitspakete = kleinste plan- und steuerbare Einheit.\n\nArbeitspaket-Beschreibung: Ziele, Ergebnis (Lieferobjekt), Schnittstellen, Aktivitäten, Voraussetzungen, Restriktionen.\n\nNetzplan: zeigt zeitliche Abfolge der Arbeitspakete. Ziel: Kritischen Pfad erkennen, Verzögerungen vermeiden.\n\nRessourcen: Personal, Sachmittel, Zeit, Geld.\nRessourcenplan: Wer arbeitet wann? Welche Mittel wann? → Engpässe vermeiden.\n\nMitarbeitende auswählen nach: Fachwissen, Erfahrung, Verfügbarkeit, Teamfähigkeit.\n\nKostenarten: Personal, Sach-, Material-, Fremdleistungen, Reise, Reserve/Puffer.\nKosten ermitteln: Erfahrungswerte, Offerten, Schätzungen.\nKostenplan: Kosten pro AP, pro Phase, Gesamtkosten.\n\nMerksatz: Der PSP ist die Basis aller weiteren Planungen."},{"id":"pm3","thema":"Projektmanagement","block":"Block 3 – 12.11.2025","titel":"Stakeholdermanagement & Projektorganisation","inhalt":"Stakeholdermanagement Grundsätze: rechtzeitig geplant, proaktiv, adressatengerecht, situationsgerecht, sorgfältig, verbindlich.\n\nVorgehen:\n1. Stakeholder identifizieren\n2. Projektumfeldanalyse\n3. Bedürfnisse & Erwartungen ermitteln\n4. Stakeholder bewerten (Einfluss/Interesse)\n5. Managementkonzept entwickeln\n6. Massnahmen planen und umsetzen\n7. Wirksamkeit kontrollieren\n\nStakeholder-Erwartungen:\n- Auftraggeber: Zielerreichung, Termine/Kosten, wirtschaftlicher Nutzen\n- Lenkungsgremium: Steuerbarkeit, Transparenz, Entscheidungsgrundlagen\n- Kunde: Qualität, Funktionalität, Zuverlässigkeit\n\n6-W-Fragen: Wer, Was, Warum, Wann, Wie, Womit.\n\nMassnahmen:\n- Auftraggeber: Statusberichte, Entscheidungsmeetings\n- Projektteam: Teammeetings, Arbeitsanweisungen, Feedback\n- Kunden: Fortschrittsinformation, Abstimmungen, Abnahmen\n\nProjektorganisation:\n- Lenkung (strategisch): Auftraggeber, Lenkungsausschuss\n- Führung (operativ): Projektleitung → planen, koordinieren, kontrollieren\n- Ausführung: Projektteam → Aufgaben umsetzen"},{"id":"pm4","thema":"Projektmanagement","block":"Block 4 – 21.01.2026","titel":"Projektcontrolling, Risikomanagement & Abschluss","inhalt":"Projektcontrolling: Soll-Ist-Vergleiche, Abweichungen erkennen, Ursachen analysieren, Steuerungsmassnahmen, Status transparent machen.\n\nFertigstellungsgrad 3 Methoden:\n1. Subjektiv: Einschätzung PL/Team (schnell, fehleranfällig)\n2. Meilensteinmethode: nur bei definierten Meilensteinen (klar, aber grob)\n3. Earned-Value-Methode: Kosten + Zeit + Leistung kombiniert (präzise, aufwendig)\n\nPhasenmodell Beispiel: Planung 30%×100%=30% + Umsetzung 50%×60%=30% + Abschluss 20%×0%=0% = Total 60%.\n\nAbweichungsursachen: unklare Anforderungen, falsche Schätzung, Ressourcenmangel, technische Probleme, Kommunikationsfehler.\n\nSteuerungsmassnahmen:\n- Projektbezogen: Termine neu planen, Ressourcen erhöhen, Scope reduzieren\n- Strategisch: Ziele anpassen, Projekt stoppen\n- Strukturbezogen: Rollen klären\n- Kulturbezogen: Kommunikation verbessern\n\nRisikomanagement Prozess: Erkennen → Analysieren → Bewerten → Bewältigen → Überwachen.\nRPN = Wahrscheinlichkeit × Auswirkung → Risikoportfolio-Matrix.\nMassnahmen: Präventiv, Eventualmassnahmen (Notfallplan), Frühwarnsysteme.\n\nÄnderungsmanagement: schriftlich festhalten, Auswirkungen prüfen, dokumentieren, erst dann weiterarbeiten.\n\nProjektabschluss: Übergabe-/Übernahmeprotokoll, Schlussbericht, Schlussabrechnung, Team auflösen."},{"id":"pz1","thema":"Prozessmanagement","block":"Block 1 – 16.12.2025","titel":"Grundlagen, Prozesstypen & Informationssysteme","inhalt":"Prozess = Abfolge von Tätigkeiten: Input → Output → Kundennutzen.\nProzessmanagement = systematische Planung, Gestaltung, Steuerung und Verbesserung von Geschäftsprozessen.\nZiele: Effizienz steigern, Qualität sichern, Kosten senken, Transparenz schaffen.\n\n3 Prozesstypen:\n- Wertschöpfungsprozesse (Kernprozesse): direkt Kundennutzen → ERP, CRM, Fachanwendungen\n- Unterstützungsprozesse: ermöglichen Wertschöpfung, kein direkter Marktwert → HR, Buchhaltung, IT\n- Führungsprozesse: strategische und operative Steuerung → Strategie, QM, Budgetplanung\nMerksatz: Führung lenkt – Wertschöpfung verdient – Unterstützung ermöglicht.\n\nAlternative Bezeichnungen: Core/Support/Management oder Primary/Secondary/Tertiary.\n\nModellierungsmethoden: EPK/EPC (ARIS), BPMN 2.0 (internationaler Standard), UML, Value Chain Porter.\n\nIT-Systeme:\n- ERP (Enterprise Resource Planning): SAP, MS Dynamics, Abacus\n- CRM (Customer Relationship Management): HubSpot, Salesforce\n- DMS/ECM (Dokumentenmanagement): SharePoint\n- MIS (Management-Informationssysteme): Power BI, Tableau\n- Workflow-Systeme: Camunda\n\nEnterprise Architecture:\n- Geschäftsarchitektur: Geschäftsmodell, Prozesse, Rollen, Strategie\n- IS-/Applikationsarchitektur: ERP, CRM, Schnittstellen\n- Technologiearchitektur: Server, Cloud, Netz, Sicherheit\nMerksatz: Geschäft definiert Anforderungen – IT setzt um – Technologie betreibt."},{"id":"pz2","thema":"Prozessmanagement","block":"Block 2 – 22.12.2025","titel":"Ist- & Soll-Modellierung, Turtle-Methode","inhalt":"Prozessentwicklung: Erheben → Analysieren → Modellieren → Bewerten und verbessern.\n\nIst-Modellierung (aktuellen Zustand verstehen):\nVorbereitung (Ziel definieren) → Eingrenzung (Start-/Endpunkt) → Erhebung (Daten sammeln) → Analyse (Schwachstellen, Medienbrüche, Doppelarbeit erkennen).\n\nErhebungstechniken: Dokumentationsanalyse, Interview, Fragebogen, Multimomentstudie, Laufzettelverfahren, Selbstaufschreibung.\n\nTurtle-Methode (strukturierte Prozessanalyse):\n- Input: Was kommt in den Prozess?\n- Womit: Mittel/Ressourcen?\n- Wer: Rollen/Personen?\n- Wie: Methoden, Regeln?\n- Wofür: Zweck/Ziel?\n- Output: Ergebnis des Prozesses\n\nSoll-Modellierung (Zielzustand):\n- Interne Ziele: Effizienz, Qualität, Kosten, Transparenz\n- Externe Ziele: Kundenzufriedenheit, Servicequalität\nPhasen: Vorbereitung → Grober Entwurf → Modellierung → Bewertung → Einführung.\n\nVollständiger Prozessbeschrieb: Prozessname, Ziel, Start-/Endpunkt, Input/Output, Verantwortlichkeiten, Rollen, Schnittstellen, IT-Systeme, Kennzahlen, Risiken.\n\nMerksatz: Ohne Ist-Analyse kein sinnvoller Soll-Prozess."},{"id":"pz3","thema":"Prozessmanagement","block":"Block 3 – 14.01.2026","titel":"Prozesslandkarte, Flussdiagramme DIN 66001 & EPK","inhalt":"Prozesslandkarte: Zeigt alle Prozesse auf einer Seite.\nProzesshierarchie: Prozesslandkarte → Hauptprozess → Teilprozess → Unterprozess → Arbeitsschritt.\n\nFolgebeziehungen:\n- Unverzweigte Kette: A→B→C, keine Entscheidung\n- Verzweigte Kette (ODER): Entscheidung Ja/Nein, nur ein Weg\n- Verknüpfung (UND): mehrere Schritte parallel, alle müssen erledigt sein\n- Rückkopplung: Ergebnis führt zurück (z.B. Qualitätskontrolle → Nacharbeit)\n\nFlussdiagramm-Symbole DIN 66001 (AUSWENDIG!):\n- Oval = Start/Ende\n- Rechteck = Tätigkeit (Arbeitsschritt)\n- Raute = Entscheidung (Ja/Nein)\n- Pfeil = Flusslinie (Reihenfolge)\n- Parallelogramm = Ein-/Ausgabe (Daten)\n- Kreis = Verbinder (Fortsetzung)\n\nEPK (Ereignisgesteuerte Prozesskette): Ereignis → Funktion → Ereignis, mit UND/ODER/XOR.\n\nSpaghetti-Diagramm: Zeigt chaotische Realität (viele Wege, Rückläufe) → Ineffizienz sichtbar machen.\n\nPrüfungssatz: Nicht dokumentiert = nicht existent!"},{"id":"pz4","thema":"Prozessmanagement","block":"Block 4 – 28.01.2026","titel":"GPO, BPR, Lean, Six Sigma, PDCA & Kennzahlen","inhalt":"Prozessorientierung: Fokus auf Abläufe End-to-End, nicht auf Abteilungen. Gegensatz: Funktionsorientierung (Silos).\n\nGPO vs. BPR:\n- GPO (Geschäftsprozessoptimierung): schrittweise, risikoarm, kontinuierlich → Lean, PDCA, Kaizen = EVOLUTIONÄR\n- BPR (Business Process Reengineering): radikal, hoher Nutzen aber hohes Risiko = REVOLUTIONÄR\n\nPDCA-Zyklus (Deming): Plan → Do → Check → Act → Grundlage KVP.\n\nLean Management:\nZiel: Verschwendung eliminieren, Kundennutzen maximieren.\n7+1 Verschwendungsarten (T-W-T-I-B-F-B-K):\nÜberproduktion, Wartezeiten, Transport, Ineffiziente Prozesse, Bewegungen, Fehler/Nacharbeit, Bestände, Nicht genutzte Kreativität.\n\nTCT (Total Cycle Time): Fokus auf Durchlaufzeit. Zeit = Kosten = Wettbewerbsfaktor.\n\nSix Sigma DMAIC:\nD = Define (Problem & Ziel)\nM = Measure (Daten erfassen)\nA = Analyze (Ursachen analysieren)\nI = Improve (Lösungen umsetzen)\nC = Control (Nachhaltigkeit sichern)\nFokus: Qualität & Varianzreduktion.\n\n5 Phasen Reorganisation: Prozessidentifikation → Ist-Analyse → Soll-Design → Implementierung → Controlling/KVP.\n\nProzesskennzahlen Z-K-Q-L:\n- Zeit: Durchlaufzeit, Bearbeitungszeit, Wartezeit, TCT, Rüstzeit\n- Kosten: Prozesskosten, Kosten/Auftrag, Nacharbeitskosten\n- Qualität: Fehlerquote, Reklamationsquote, Nacharbeitsquote, Ausschussquote\n- Leistung/Lieferung: Produktivität, Auslastung, Termintreue, Servicegrad\n\nMerksätze: Ohne Messung keine Verbesserung | BPR = radikal | GPO = kontinuierlich"},{"id":"rw1","thema":"Rechnungswesen","block":"Block 1 – 07.01.2026","titel":"Jahresrechnung, Bilanz, Geldflussrechnung & Buchungslogik","inhalt":"Jahresrechnung: Bilanz + Erfolgsrechnung + Geldflussrechnung + Anhang + Antrag Bilanzgewinnverwendung.\n\nBilanz:\n- Aktiven (links) = Mittelverwendung: Flüssige Mittel, Forderungen, Vorräte, Maschinen, Immobilien\n- Passiven (rechts) = Mittelherkunft: Fremdkapital + Eigenkapital\n\nBilanzveränderungen:\n- Bilanzverlängerung: Aktiv↑ / Passiv↑\n- Bilanzverkürzung: Aktiv↓ / Passiv↓\n- Aktivtausch: Aktiv↔Aktiv → bilanzwirksam, NICHT erfolgswirksam\n- Passivtausch: Passiv↔Passiv\n\nSoll & Haben:\n- Aktivkonto: Zunahme im SOLL, Abnahme im HABEN\n- Passivkonto: Zunahme im HABEN, Abnahme im SOLL\n- Aufwandkonto: Zunahme im SOLL\n- Ertragskonto: Zunahme im HABEN\n\nErfolgswirksam vs. Liquiditätswirksam:\n- Abschreibung: erfolgswirksam, NICHT liquiditätswirksam\n- Barverkauf: beides\n- Kreditaufnahme: liquiditätswirksam, NICHT erfolgswirksam\n\nGeldflussrechnung 3 Bereiche:\n1. Geschäftstätigkeit: Löhne, Kunden, Lieferanten\n2. Investitionstätigkeit: Maschinen/Immobilien kaufen/verkaufen\n3. Finanzierungstätigkeit: Kredite, Eigenkapital, Dividenden\n\nDirekte Methode: tatsächliche Ein-/Auszahlungen.\nIndirekte Methode: Start beim Jahresgewinn, Korrektur um nicht geldwirksame Positionen.\nPflicht wenn 2 von 3: Umsatz ≥ CHF 40 Mio, Bilanzsumme ≥ CHF 20 Mio, ≥ 250 Mitarbeiter.\n\nMerksatz: Gewinn ≠ Geld!"},{"id":"rw2","thema":"Rechnungswesen","block":"Block 2 – 12.01.2026","titel":"Erfolgsrechnung, Abschreibungen & Kontenrahmen","inhalt":"Erfolgsrechnung Mindestgliederung CH-Standard:\nNettoerlös (Revenue)\n– Warenaufwand/Herstellkosten (COGS)\n= Bruttoerfolg 1 (Gross Profit 1) → zeigt ob Kerngeschäft funktioniert\n– Betriebsaufwand (Löhne, Miete, Energie, URE, Versicherungen)\n= Bruttoerfolg 2\n– Abschreibungen (materiell + immateriell)\n= EBIT (Earnings Before Interest and Taxes)\n± Finanzerfolg (Zinsertrag / Zinsaufwand)\n= EBT (Ergebnis vor Steuern)\n– Steuern\n= Jahresgewinn / Net Profit\n\nAbschreibungen:\n- Planmässige Wertverminderung über Nutzungsdauer\n- KEIN Geldabfluss, aber erfolgswirksamer Aufwand!\n- Materiell (Depreciation): Maschinen, Fahrzeuge, Computer, Gebäude\n- Immateriell (Amortisation): Patente, Software, Lizenzen, Goodwill\n\nURE (Unterhalt, Reparatur, Ersatzteile): IMMER Aufwand! Keine Aktivierung.\n\nKontenklassen CH-KMU:\n1000 = Flüssige Mittel, 1100 = Forderungen, 1500 = Maschinen\n2000 = Verbindlichkeiten, 3000 = Eigenkapital\n4000 = Ertrag, 5000 = Materialaufwand, 6000 = Betriebsaufwand\n4000–6999 = Erfolgskonten.\n\nKennzahlen:\n- ROE = Gewinn / Eigenkapital × 100\n- Umsatzrentabilität = Gewinn / Umsatz × 100\n- Wirtschaftlichkeit = Ertrag / Aufwand (=1 wirtschaftlich, <1 unwirtschaftlich)"},{"id":"rw3","thema":"Rechnungswesen","block":"Block 3 – 26.01.2026","titel":"Abschreibungsmethoden, Delkredere & Wertberichtigungen","inhalt":"Anlagevermögen: dauerhafte Nutzung >1 Jahr → Maschinen, Fahrzeuge, IT, Gebäude.\nUmlaufvermögen: kurzfristig → Warenlager, Rohstoffe, Forderungen, Flüssige Mittel.\n\nDirekte Abschreibung: Anlagewert wird direkt reduziert. Buchung: Abschreibungen an Maschine. Bilanz: nur Restbuchwert sichtbar.\nIndirekte Abschreibung (Wertberichtigung): Anlage bleibt zum Anschaffungswert, Korrekturkonto. Buchung: Abschreibungen an Wertberichtigung Maschine. Bilanz: AW – Wertberichtigung = Buchwert. (Praxis und Prüfungen sehr häufig!)\n\nAbschreibungsmethoden:\n- Linear: jährlich gleicher Betrag. Formel: (AK – Restwert) / Nutzungsdauer. Standard.\n- Degressiv: höherer Betrag am Anfang. Formel: Buchwert × Abschreibungssatz.\n\nForderungsverluste: Kunde zahlt definitiv nicht. Buchung: Forderungsverluste an Forderungen LL → Aufwand↑.\n\nDelkredere (pauschale Wertberichtigung auf Forderungen):\n- Vorsorge für zukünftige Zahlungsausfälle, pauschale Schätzung 2–5%\n- Bildung: Delkredereaufwand an Delkredere\n- Auflösung: Delkredere an Delkredereertrag\n- Bilanz: Forderungen LL – Delkredere = Nettowert\n\nVorsichtsprinzip: Vermögenswerte nicht zu hoch ausweisen.\nMerksatz: Direkt = Wert direkt reduzieren, Indirekt = Wertberichtigungskonto, Linear = gleichmässig, Degressiv = Anfang höher, Forderungsverlust = definitiv, Delkredere = vorsorglich."},{"id":"rw4","thema":"Rechnungswesen","block":"Block 4 – Stille Reserven","titel":"Stille Reserven","inhalt":"Stille Reserven = Differenz zwischen internem Buchwert und externem (tatsächlichem) Wert.\n\nEntstehung: zu hohe interne Abschreibungen vs. effektivem Wertverlust. Interner Restwert < Externer Marktwert = Stille Reserve.\n\nBerechnung: Stille Reserve = Externer Restwert – Interner Restwert.\nVeränderung = Stille Reserve Ende – Stille Reserve Anfang.\n\nWirkung auf EK: Interne ER weist tieferen Gewinn aus als externe → EK intern < EK extern → Differenz = Stille Reserve im EK.\n\nAuflösung: wenn intern höher abgeschrieben als extern → Stille Reserve sinkt → erscheint als Ertrag intern."},{"id":"sc1","thema":"Supply Chain","block":"Block 1 – 04.03.2026","titel":"Grundlagen, Beschaffung, FMEA & Zielkonflikte","inhalt":"Supply Chain = gesamte Wertschöpfungskette: Lieferant → Beschaffung → Produktion → Lager → Distribution → Kunde.\nZiel: richtige Menge, richtige Zeit, richtige Qualität, minimale Kosten.\n\nFMEA (Fehlermöglichkeits- und Einflussanalyse):\nZiel: Fehler früh erkennen und vermeiden.\nVorgehen: Prozess auswählen → Strukturanalyse → Fehler identifizieren → Bewertung → Massnahmen → Nachbewertung.\nRPN = Risiko-Prioritätszahl = Bedeutung (B) × Auftreten (A) × Entdeckung (E).\n\nAudits: Systemaudit (ganzes Unternehmen), Prozessaudit (Abläufe), Produktaudit (Endprodukt).\n\nHebelwirkung Beschaffung: kleine Einsparung im Einkauf → grosse Gewinnwirkung.\n\nBeschaffung traditionell: Preis, Menge, Termin, Qualität, Zahlungskonditionen.\nBeschaffung modern: Lieferantenmanagement, -integration, Make-or-Buy, Lageroptimierung, TCO.\n\nBeschaffungsprozess: Bedarf erkennen → Lieferant auswählen → Bestellung → Lieferung → Wareneingang → Kontrolle → Lagerung.\n\nBedarfsarten:\n- Primärbedarf = Endprodukte\n- Sekundärbedarf = Bauteile\n- Tertiärbedarf = Hilfsstoffe\n\nBedarfsermittlung: Bruttobedarf = Gesamtbedarf. Nettobedarf = Bruttobedarf – Lagerbestand – offene Bestellungen.\n\nABC-Analyse: Verbrauchswert = Menge × Preis.\nA = hoher Wert (wenige Teile) → streng kontrollieren.\nC = viele Teile, kleiner Wert → vereinfachen.\n\nZielkonflikte: Kosten, Qualität, Zeit, Innovation, Liquidität, Risiko, Nachhaltigkeit."},{"id":"sc2","thema":"Supply Chain","block":"Block 2 – 18.03.2026","titel":"ABC/XYZ-Analyse, Bedarfsermittlung & Gozinto","inhalt":"ABC-Analyse Vorgehen:\n1. Artikel erfassen\n2. Jahresverbrauch bestimmen\n3. Einzelpreis erfassen\n4. Verbrauchswert = Menge × Preis\n5. Sortieren hoch→tief\n6. Kumulieren\n7. Einteilen A/B/C\n\nXYZ-Analyse (Verbrauch/Prognostizierbarkeit):\nX = konstant, gut planbar\nY = schwankend, mittel\nZ = unregelmässig, schwer planbar\n\nABC + XYZ kombiniert:\nAX = wichtig + gut planbar → ideal, JiT\nAY = wichtig + saisonal → Prognosen + Sicherheitsbestand\nAZ = wichtig + unsicher → kritisch, höhere Bestände\nCX = unwichtig + stabil → automatisieren\nCZ = unwichtig + chaotisch → einfache Beschaffung\n\nBedarfsermittlung:\n- Deterministisch (Bedarf bekannt): programmorientiert, Stückliste + Ausschuss – Lagerbestand = Nettobedarf. EXAKT.\n- Stochastisch (Bedarf geschätzt): Mittelwertverfahren. PROGNOSE.\n\nMittelwertverfahren:\n- Arithmetischer Mittelwert: Durchschnitt aller Werte → glättet stark, reagiert langsam\n- Gleitender Mittelwert: nur letzte Perioden → reagiert schneller\n\nStückliste: zeigt welche Teile in einem Produkt enthalten sind.\nVerwendungsnachweis: zeigt wo ein Teil verwendet wird.\n\nGozinto-Graph (geht hinein in): Produkt → Baugruppen → Einzelteile. Nutzen: Bedarf ableiten, Struktur verstehen.\n\nPrüfungslogik: Deterministisch = exakt (Stückliste), Stochastisch = Prognose (Mittelwert), ABC = Wert, XYZ = Planbarkeit."},{"id":"sc3","thema":"Supply Chain","block":"Block 3 – 29.04.2026","titel":"Bestandsarten, Andler-Formel, Bullwhip & Lieferantenauswahl","inhalt":"ABC Kennzahlen: A = ~20% Menge / ~80% Wert, B = ~30% / ~15%, C = ~50% / ~5%.\n\nBestandsarten:\n- Mindestbestand = Sicherheitsreserve\n- Maximalbestand = Lagerlimit\n- Meldebestand = Bestellpunkt\n- Durchschnittsbestand\n- Sicherheitsbestand\n\nBeschaffungsformen:\n- Vorratsbeschaffung: Einkauf auf Lager. + Mengenrabatte, – Lagerkosten, Kapitalbindung\n- Just-in-Time JiT: Lieferung genau bei Bedarf. + kaum Lagerkosten, – Abhängigkeit vom Lieferanten\n- Fertigungssynchron: noch exakter als JiT. + maximale Effizienz, – extrem störanfällig\n- Fallweise: nur bei Bedarf (Sonderteile)\n\nOptimale Bestellmenge Andler-Formel:\nQ* = Wurzel(2 × B × Kb / Kl)\nB = Jahresbedarf, Kb = Bestellkosten, Kl = Lagerkosten pro Stück.\nZiel: Summe aus Lager- und Bestellkosten minimieren.\n\nBestellpunktverfahren: Bestellung bei Erreichen Meldebestand.\nMeldebestand = Verbrauch während Lieferzeit + Sicherheitsbestand.\n\nBestellrhythmusverfahren: Bestellung in fixen Zeitabständen.\n\nBullwhip-Effekt: kleine Nachfrageschwankung Endkunde → grosse Schwankung beim Vorlieferanten.\nUrsachen: schlechte Kommunikation, Sicherheitsbestände, Prognosefehler.\nLösung: transparente Daten, IT-Systeme, stabile Planung.\n\nFehlmengenkosten: Produktionsstillstand, Kundenverlust, Expresslieferungen → oft höher als Lagerkosten!\n\nNutzwertanalyse für Lieferantenauswahl:\n1. Muss-Kriterien (KO-Kriterien)\n2. Soll-Kriterien (bewertbar)\n3. Gewichtung festlegen\n4. Bewertung 1–5 Punkte\n5. Nutzwert = Gewichtung × Punkte"},{"id":"uf1","thema":"Unternehmensführung","block":"Block 1 – 29.10.2025","titel":"BWL Grundlagen: Bedürfnisse, Wirtschaftsgüter, Produktionsfaktoren","inhalt":"Angebot & Nachfrage: Marktpreis entsteht durch Zusammenspiel. Nachfrage = Bedarf + Kaufkraft.\n\nMaslows Bedürfnispyramide (unten→oben):\n1. Physiologisch (Essen, Trinken, Schlaf)\n2. Sicherheit (Wohnung, Einkommen)\n3. Sozial (Zugehörigkeit, Familie)\n4. Individual (Anerkennung, Status)\n5. Selbstverwirklichung\n\nWirtschaftsgüter: knapp, haben Preis.\n- Materiell (Sachgüter): Lebensmittel, Maschinen, Kleidung\n- Immateriell: Dienstleistungen, Patente, Lizenzen, Software\n- Freie Güter: nicht knapp, kein Preis (Luft, Sonnenlicht)\n\nVerbrauchsgüter (sofort verbraucht) vs. Gebrauchsgüter (mehrfach) vs. Investitionsgüter (dienen Produktion).\n\nProduktionsfaktoren: Arbeit, Know-how, Betriebsmittel (Maschinen, Gebäude), Werkstoffe (Rohstoffe).\n\nWirtschaftssektoren:\n- Primärsektor: Landwirtschaft, Forstwirtschaft, Bergbau\n- Sekundärsektor: Industrie, Fabrikation\n- Tertiärsektor: Dienstleistungen, Handel, Pflege\n\nRechtsformen: Einzelunternehmen, GmbH, AG.\nEffizienz = Dinge richtig tun. Effektivität = die richtigen Dinge tun."},{"id":"uf2","thema":"Unternehmensführung","block":"Block 2 – 08.12.2025","titel":"Wertkette Porter, Kennzahlen & Marketing-Mix","inhalt":"Wertkette Porter:\nPrimäre Aktivitäten:\n- Eingangslogistik: Warenannahme, Lagerung, Materialbereitstellung\n- Operationen/Produktion: Verarbeiten, Montieren, QS\n- Ausgangslogistik: Verpackung, Transport, Versand\n- Marketing & Vertrieb: Marktforschung, Werbung, Preisgestaltung\n- Service: Garantie, Reparaturen, Kundendienst\n\nSekundäre Aktivitäten:\n- Unternehmensinfrastruktur: Management, Finanzen, Recht\n- Personalmanagement: Rekrutierung, Entwicklung\n- Technologieentwicklung: IT, F&E\n- Beschaffung/Einkauf\n\nAbsatz = verkaufte Menge. Umsatz = Absatz × Preis.\n\nProduktivität = Output / Input. Wirtschaftlichkeit = Ertrag / Aufwand.\nROE = Gewinn / Eigenkapital × 100.\nUmsatzrentabilität = Gewinn / Umsatz × 100.\n\nMarketing-Mix 4P: Product, Price, Place, Promotion.\n7P: +People, +Process, +Physical Evidence.\n\nAbsatzkanäle: Direkt (Hersteller→Kunde) vs. Indirekt (Zwischenhändler).\nB2B = Unternehmen→Unternehmen. B2C = Unternehmen→Privatkunden.\n\nRechnungswesen: erfassen. Controlling: analysieren (Soll-Ist-Vergleiche, Frühwarnsystem)."},{"id":"uf3","thema":"Unternehmensführung","block":"Block 3 – 16.12.2025","titel":"Prozesstypen, IT-Systeme & Unternehmensarchitektur","inhalt":"Prozesstypen & IT:\n- Wertschöpfung (Kernprozesse = Primärprozesse): ERP, CRM, Fachanwendungen\n- Unterstützung (Sekundärprozesse): HR-Systeme, DMS, Finanzsoftware\n- Führung (Managementprozesse): MIS, BI-Systeme, Dashboards\n\nBeispiel Wertschöpfungsprozess (Dienstleistung beim Kunden):\nKontaktaufnahme (CRM) → Bedarfserfassung → Angebot (ERP) → Auftragsbestätigung → Leistungserbringung (App) → Dokumentation (DMS) → Abrechnung (ERP).\n\nInformationssysteme:\n- Kommunikation: E-Mail, Chat (Teams, Slack), Videokonferenzen\n- Transaktionssysteme: ERP, CRM, Fachanwendungen\n- Dokumentensysteme: DMS, Intranet, Wiki\n- Management: MIS, BI-Tools, Controlling\n\nUnternehmensarchitektur:\n- Geschäftsarchitektur (WAS?): Geschäftsmodell, Prozesse, Organisation, Strategie\n- IS-Architektur (WELCHE Software?): ERP, CRM, DMS, Schnittstellen\n- Technologiearchitektur (WOMIT?): Server/Cloud, Netzwerke, IT-Sicherheit\n\nMerksatz: Geschäft definiert Anforderungen – IT setzt um – Technologie betreibt."},{"id":"uf4","thema":"Unternehmensführung","block":"Block 4 – 16.03.2026","titel":"St. Galler Management-Modell (SGMM)","inhalt":"Unternehmen als System: offen + komplex + dynamisch.\nInput: Kapital, Material, Arbeit, Information. Output: Produkte, Dienstleistungen, Löhne.\n\nSGMM = ganzheitliches Modell zur Unternehmensführung, Fokus auf Zusammenhänge.\n\n4 Umweltsphären (wirken von aussen, nicht kontrollierbar):\n- Gesellschaft: Werte, Normen, Demografie\n- Natur: Ressourcen, Umwelt\n- Technologie: Innovation, Digitalisierung\n- Wirtschaft: Markt, Wettbewerb\n\nAnspruchsgruppen (Stakeholder):\n- Kapitalgeber: Rendite, Sicherheit\n- Kunden: Preis, Qualität\n- Mitarbeitende: Lohn, Sicherheit\n- Lieferanten: Aufträge\n- Staat: Gesetze, Steuern\n\nSpannungsfeld: Harmonie (Interessen decken sich), Neutralität, Konflikt (Gewinn vs. Löhne).\nManagement-Aufgabe: ausgleichen, priorisieren, Kompromisse.\n\nInteraktionsthemen (beeinflussbar): Ressourcen, Normen & Werte, Anliegen & Interessen.\n\nProzesse:\n- Managementprozesse: Planung, Steuerung, Kontrolle\n- Geschäftsprozesse: Kundenprozesse, Leistungserstellung, Innovation\n- Unterstützungsprozesse: Personal, IT, Kommunikation, Risiko\n\nOrdnungsmomente: Strategie (langfristige Ausrichtung), Strukturen (Organisation), Kultur (Werte, Verhalten).\n\nEntwicklungsmodi: Optimierung (Bestehendes verbessern), Erneuerung (Neues schaffen).\n\nFührungsebenen: Normativ (Werte, Vision) → Strategisch (Wettbewerb) → Operativ (Tagesgeschäft).\n\nZentrale Logik: Umwelt → Anspruchsgruppen → Druck auf Prozesse → gesteuert durch Strategie."},{"id":"uf5","thema":"Unternehmensführung","block":"Block 5 – 01.04.2026","titel":"Unternehmensziele, SMART & Strategieprozess","inhalt":"Unternehmensziele 3 Ebenen:\n- Normativ (langfristig, Werte): Vision, Leitbild, Grundwerte\n- Strategisch (mittel-/langfristig): Wettbewerbsvorteile sichern\n- Operativ (kurzfristig, konkret): Tagesgeschäft, messbar\n\nZielarten:\n- Leistungswirtschaftlich: Produktziele (Qualität, Innovation), Marktziele (Marktanteil)\n- Finanzwirtschaftlich: Liquidität, Ertrag, Sicherheit\n- Sozial: Mitarbeiterzufriedenheit, Umweltverantwortung\n\nZielbeziehungen:\n- Zielharmonie: Ziele unterstützen sich (Qualität↑ → Kundenzufriedenheit↑)\n- Zielkonflikt: Ziele widersprechen sich (Kosten↓ vs. Qualität↑)\n- Zielneutralität: kein Einfluss\n\nSMART: Spezifisch, Messbar, Attraktiv/Erreichbar, Realistisch/Relevant, Terminiert.\n\nQualitative Ziele → quantitativ machen für Kontrolle und Vergleich.\nBeispiel: Kundenzufriedenheit verbessern → Kundenzufriedenheit auf 85% erhöhen.\n\nStrategieprozess: Umweltanalyse → Unternehmensanalyse → SWOT → Strategiewahl → Strategieumsetzung.\n\nFive Forces Porter: Konkurrenz, neue Anbieter, Ersatzprodukte, Kundenmacht, Lieferantenmacht.\n\nMarktanalyse Segmentierung: Geografisch, Demografisch, Sozialpsychologisch, Verhalten."},{"id":"uf6","thema":"Unternehmensführung","block":"Block 6 – 30.03.2026","titel":"Nachhaltigkeit, CSR, ESG & Compliance","inhalt":"Nachhaltigkeit: Bedürfnisse heutiger Generation erfüllen ohne zukünftige zu gefährden.\n3 Dimensionen: Ökologie (Umwelt), Ökonomie (Wirtschaft), Soziales (Menschen). Spannungsfeld = Zielkonflikt.\n\nCSR = Corporate Social Responsibility = Unternehmerische Gesellschaftsverantwortung.\nFreiwillige Verantwortung über gesetzliche Anforderungen hinaus.\n\nCarroll CSR-Pyramide (von unten nach oben, alles baut aufeinander auf):\n1. Ökonomisch: Gewinn erzielen, Arbeitsplätze sichern\n2. Rechtlich: Gesetze einhalten\n3. Ethisch: fair, korrekt, moralisch handeln\n4. Philanthropisch: freiwilliges Engagement (Spenden, Projekte)\n\nESG:\nE = Environmental: CO₂ reduzieren, Ressourcen schonen\nS = Social: Mitarbeiter fair, Menschenrechte, Kundenschutz\nG = Governance: Transparenz, Kontrolle, Korruption verhindern\n\nUnternehmensethik Begriffe:\n- Ethik = Theorie/Reflexion über Moral (Was ist richtig/falsch?)\n- Moral = tatsächliches Verhalten\n- Werte = innere Überzeugungen (Ehrlichkeit, Respekt)\n- Normen = konkrete Regeln (Gesetze, Verhaltensregeln)\n\nCompliance = Einhaltung von Gesetzen, Richtlinien, internen Regeln. Ziel: Risiken vermeiden.\nCCO = Chief Compliance Officer: Überwachung, Umsetzung, Schulung.\n\nMerksatz: Ein Unternehmen ist langfristig erfolgreich wenn es wirtschaftlich, ökologisch und sozial verantwortungsvoll handelt."},{"id":"re1","thema":"Recht","block":"Block 1 – 18.02.2026","titel":"Privatrecht, ZGB, OR, Haftung & Vertragsrecht","inhalt":"Rechtsquellen: ZGB (Zivilgesetzbuch) + OR (Obligationenrecht) = Privatrecht. StGB = Strafrecht.\n\nZGB-Aufbau: Einleitungstitel (Art. 1–10), Personenrecht (11–89), Familienrecht (90–456), Erbrecht (457–640), Sachenrecht (641–977).\n\nOR-Aufbau: Allgemeiner Teil (Art. 1–183): Vertragsentstehung, Obligationen, Haftung. Besonderer Teil (184–551): Vertragsarten, Gesellschaftsrecht. Arbeitsvertrag = OR Art. 319 ff.\n\nStGB: Materielles Strafrecht (welche Taten strafbar) + Formelles Strafrecht = StPO.\n\nGrundsätze Privatrecht ZGB Art. 1–4: Gesetz, Gewohnheitsrecht, Richterrecht, Lehre & Überlieferung.\nWeitere: Treu und Glauben, Verbot Rechtsmissbrauch, Beweislast: Wer behauptet muss beweisen.\n\nPersonenrecht: Rechtsfähigkeit ab Geburt. Handlungsfähig = urteilsfähig + volljährig (18 Jahre).\n\nAbsolutes Recht: gegenüber allen durchsetzbar (Eigentum, Persönlichkeitsrechte).\nRelatives Recht: nur gegenüber bestimmter Person (Forderung aus Vertrag).\n\nDispositives Recht: Parteien dürfen abweichen (z.B. Zahlungsfristen).\nZwingendes Recht: darf nicht geändert werden (z.B. Mindestferien im Arbeitsrecht).\n\nObligation: Gläubiger (Forderung) ↔ Schuldner (Leistungspflicht).\nEntstehungsgründe: Vertrag, Unerlaubte Handlung, Ungerechtfertigte Bereicherung.\n\nHaftung:\n- Vertragliche Haftung: Schaden durch Vertragsverletzung\n- Ausservertragliche Haftung: Schaden ohne Vertrag\n- Verschuldenshaftung: Schaden + Widerrechtlichkeit + Kausalzusammenhang + Verschulden\n- Kausalhaftung (ohne Verschulden): Tierhalterhaftung, Werkeigentümerhaftung, PrHG\n\nVertragsentstehung 4 Voraussetzungen: Handlungsfähigkeit, übereinstimmende Willensäusserung, gesetzlich erlaubter Inhalt, Einhaltung der Form.\n\nFormvorschriften: Grundstückkauf + Ehevertrag = öffentlich beurkundet. Bürgschaft = Schriftform. Sonst Formfreiheit.\n\nVertragsauflösung: Erfüllung, Kündigung, Rücktritt, Anfechtung, Aufhebungsvertrag, Unmöglichkeit.\n\nWettbewerbsrecht UWG: schützt fairen Wettbewerb. Verboten: irreführende Werbung, Verunglimpfung.\nImmaterialgüterrecht: Urheberrecht, Markenrecht, Patentrecht, Designrecht."},{"id":"re2","thema":"Recht","block":"Block 2 – 23.03.2026","titel":"Mietrecht, Mängel, Kündigung & Arbeitsrecht","inhalt":"Mietvertrag OR 253: Vermieter überlässt Sache zum Gebrauch, Mieter zahlt Mietzins. Gegenseitiger Vertrag (Synallagma). Formfrei möglich (auch mündlich).\n\nPflichten Vermieter: Hauptpflicht = gebrauchstaugliche Sache übergeben & erhalten. Nebenpflichten: Unterhalt/Reparaturen, Nebenkosten korrekt abrechnen.\nPflichten Mieter: Hauptpflicht = Mietzins zahlen. Nebenpflichten: Sorgfalt, Rücksichtnahme, Kleinreparaturen, Meldepflicht.\n\nMängel:\n- Leichter Mangel: kleine Beeinträchtigung (Glühbirne) → selbst beheben auf Kosten Vermieter\n- Mittlerer Mangel: Nutzung eingeschränkt → Mietzinsreduktion, Reparatur verlangen\n- Schwerer Mangel: Nutzung nicht möglich → Mietzins hinterlegen, fristlose Kündigung, Schadenersatz\nNormale Abnützung = Vermieter trägt Kosten.\n\nVorgehen bei Mängeln: Mangel melden → Frist setzen → Rechte geltend machen.\n\nVerzug Vermieter: Mahnung → Nachfrist → Wahlrechte (Festhalten + SE, Verzicht + SE, Rücktritt).\nVerfalltagsgeschäft = fixer Termin, keine Mahnung nötig.\n\nVorgehen Vermieter Zahlungsverzug: Mahnung + 30 Tage Frist → Kündigungsandrohung → Kündigung.\n\nKündigung:\n- Ordentlich: mit Frist & Termin\n- Ausserordentlich: bei schwerem Grund\nKündigungsfristen: Wohnung = 3 Monate, Geschäftsräume = 6 Monate.\n\nMieterschutz: missbräuchliche Mietzinse anfechten. Kündigung darf nicht treuwidrig/Rachekündigung sein → Anfechtung oder Erstreckung.\n\nArbeitsrecht OR 319:\n- Arbeitnehmer: Arbeit leisten, Treuepflicht, Sorgfalt\n- Arbeitgeber: Lohn zahlen, Fürsorgepflicht, Arbeitsschutz\n\nKündigungsfristen: Probezeit = 7 Tage. 1 Jahr = 1 Monat. 2–9 Jahre = 2 Monate. Ab 10 Jahre = 3 Monate.\nKündigungsschutz: missbräuchliche Kündigung verboten. Sperrfristen: Krankheit, Unfall, Schwangerschaft.\n\nMerksätze: Synallagma = Leistung ↔ Gegenleistung. Mängel = leicht/mittel/schwer. Immer: melden → Frist → Rechte."},{"id":"uf7","thema":"Unternehmensführung","block":"Kapitel 8 – Unternehmensanalyse","titel":"Stärken-Schwächen-Analyse, Benchmarking, Wertkette & BCG-Matrix","datum":"2019-01-01T00:00:00.000Z","inhalt":"Unternehmensanalyse = Blick nach innen. 3 Instrumente: Stärken-Schwächen-Analyse, Wertkettenanalyse, Portfolio-Analyse (BCG-Matrix).\n\nStärken-Schwächen-Analyse:\n12 Dimensionen mit je 1–10 Punkten bewertet:\n- Kunden: Stammkunden, Zufriedenheit, Image\n- Produkte & DL: Qualität, Kundenzufriedenheit, Preise\n- Wettbewerbsposition: Marktanteil, Position im Wettbewerb\n- Innovation: Anzahl Patente, Umsatzanteil neue Leistungen\n- Beschaffung: Bezugspreise, Qualität, Lieferantenzuverlässigkeit\n- Produktion: Kapazität, Auslastung, Maschinenproduktivität\n- Distribution: Verfügbarkeit im Handel, Händlerdichte\n- Personal: Fluktuation, Fachwissen, Lohnniveau\n- Kosten: Fixkosten, variable Kosten, Kosten je Produkt\n- Finanzen: Gewinn, Margen, EK vs. FK-Anteil\n- Management: Hierarchiestufen, Prozesse, Struktur\n- Infrastruktur: Fläche, IT, Technologie-Portfolio\n\nBenchmarking:\nSystematischer Vergleich mit Soll-Zielen, Zeitentwicklung oder Konkurrenten. Ziel: Best Practice erkennen, Verbesserungen ableiten.\nDarstellung: Profildarstellung (X=Dimensionen, Y=Punkte) oder Spinnennetz (Stärken am Rand, Schwächen im Zentrum).\nUrsprung: Xerox zerlegte Canon-Kopierer und deckte eigene Kostenlücken in Logistik & Vertrieb auf.\n\nWertkettenanalyse:\nAlle Aktivitäten auf Wertschöpfung und Rentabilität untersuchen.\nJede Aktivität ist Kostenfaktor UND möglicher Wettbewerbsvorteil.\n- Kostensenkung → Kostenführer werden\n- Differenzierung → Qualität, Design → einzigartig werden\nZiele: Rationalisierungspotenzial erkennen, Differenzierungspotenzial entdecken, Schnittstellen optimieren.\nNicht nur einzelne Aktivität zählt, sondern optimale Abstimmung aller Aktivitäten aufeinander.\n\nBCG-Matrix (Boston Consulting Group):\nOrdnet Produkte nach relativem Marktanteil und Marktwachstum in 4 Felder:\n- Question Marks: niedriger Marktanteil, hohes Wachstum → investieren ODER desinvestieren (Einführung)\n- Stars: hoher Marktanteil, hohes Wachstum → halten oder investieren (Wachstum)\n- Cash Cows: hoher Marktanteil, niedriges Wachstum → abschöpfen, Erlöse reinvestieren (Reife/Sättigung)\n- Poor Dogs: niedriger Marktanteil, niedriges Wachstum → desinvestieren, aussortieren (Rückgang)\n\nLebenszyklus-Reihenfolge: Question Mark → Star → Cash Cow → Poor Dog.\n\nFormeln:\nMarktanteil = eigener Umsatz / Gesamtumsatz des Markts (aktuelles Jahr)\nMarktwachstum = Gesamtumsatz aktuelles Jahr / Gesamtumsatz Vorjahr\n\nAusgewogenes Portfolio: Cash Cows finanzieren Question Marks und Stars. Nur Poor Dogs = langfristig Untergang."},{"id":"uf8","thema":"Unternehmensführung","block":"Kapitel 9 – SWOT-Analyse","titel":"SWOT-Strategien, Erfolgsfaktoren, SEP & Kernkompetenzen","datum":"2019-01-01T00:00:00.000Z","inhalt":"SWOT-Analyse = verbindet Umweltanalyse (extern) und Unternehmensanalyse (intern).\nS = Strengths (Stärken), W = Weaknesses (Schwächen), O = Opportunities (Chancen), T = Threats (Gefahren).\nIntern = Stärken & Schwächen (beeinflussbar). Extern = Chancen & Gefahren (nicht beeinflussbar).\n\n4 SWOT-Strategien:\n- SO-Strategie (Stärke + Chance): Stärken einsetzen um Chancen zu nutzen und auszubauen. Beste Konstellation = Angriffsstrategie.\n- ST-Strategie (Stärke + Gefahr): Stärken einsetzen um Gefahren zu verringern. Wirkt als Versicherung = Verteidigungsstrategie.\n- WO-Strategie (Schwäche + Chance): Schwäche in Stärke umwandeln um Chance zu nutzen. Grösstes Verbesserungspotenzial = Aufholstrategie.\n- WT-Strategie (Schwäche + Gefahr): Schwächen reduzieren und Gefahren abwenden. Ggf. Rückzug vom Markt = Defensivstrategie.\n\nErfolgsfaktoren:\nUnbedingt notwendige Faktoren damit ein Unternehmen in einer Branche überleben kann. Variieren je nach Branche.\n3 Leitfragen zur Identifikation:\n- Umweltentwicklungen: Welche Trends verändern Branche & Märkte?\n- Wettbewerbskräfte: Wie positionieren gegen Porters 5 Forces?\n- Kundenbedürfnisse: Wofür zahlt der Kunde einen Preis?\nBeispiele: Banken = Unternehmensgrösse & Marktanteil. Pharma = Forschung & Entwicklung. Auto = Ingenieursfähigkeit & Design.\nMerksatz: Wer zukünftige Erfolgsfaktoren früher als die Konkurrenz erkennt schafft ein Nutzenpotenzial.\n\nSEP = Strategische Erfolgsposition:\nBewusst geschaffene Position der Stärke = Wettbewerbsvorteil. Sichert langfristigen Vorsprung.\nWeg: Nutzenpotenzial erkennen → SEP aufbauen → Kernkompetenz sichern.\nNutzenpotenziale in: Leistungen (Qualität, Service, Image), Märkte (Preise, Distribution), Unternehmensfunktionen (Innovation, Beschaffung, Personal), Übernahmen & Kooperationen.\n\nKernkompetenzen:\nEntstehen durch optimale Abstimmung aller Tätigkeiten und Ressourcen über alle Abteilungen. Schwer imitierbar.\n3 Merkmale einer echten Kernkompetenz:\n- Quelle einer SEP: muss Wettbewerbsvorteil begründen\n- Einzigartig & nachhaltig: schwer von Konkurrenten zu imitieren\n- Vielseitig einsetzbar: auf verschiedenen Märkten anwendbar\nPrüfungssatz: NICHT JEDE STÄRKE IST EINE KERNKOMPETENZ!\nBeispiel DaimlerChrysler: Hochleistungsfertigung von Antriebsaggregaten eingesetzt in Pkw, Lkw, Helikopter, Flugzeuge, Raketen."},{"id":"rw5","thema":"Rechnungswesen","block":"Block 5 – Stille Reserven Formeln","titel":"Stille Reserven – Alle Formeln & Entscheidungslogik","datum":"2026-01-01T00:00:00.000Z","inhalt":"Grundformel (die wichtigste!):\nDelta stille Reserven = Erfolg intern – Erfolg extern\n\nUmstellungen (kommen oft in Prüfungen!):\nErfolg extern = Erfolg intern – Delta stille Reserven\nErfolg intern = Erfolg extern + Delta stille Reserven\n\nBestand stille Reserven:\nStille Reserven = EK intern – EK extern\n\nVeränderung über Zeit:\nDelta stille Reserven = Stille Reserven Ende – Stille Reserven Anfang\n\nVerbindung mit EK:\nErfolg intern = EK intern Ende – EK intern Anfang\nErfolg extern = EK extern Ende – EK extern Anfang\n\nKombinierte Denklogik:\nIntern – Extern = Stille Reserven (Bestand)\nErfolg intern – Erfolg extern = Veränderung stille Reserven\n\nEntscheidungslogik (ohne rechnen):\nIntern > Extern = Aufbau stille Reserven\nIntern = Extern = gleich, keine Veränderung\nIntern < Extern = Auflösung stille Reserven\n\nSuper-Merksatz:\nDifferenz Erfolg = Veränderung stille Reserven\nDifferenz EK = Bestand stille Reserven"},{"id":"sc4","thema":"Supply Chain","block":"Block 5 – 29.04.2026 (Folien WSF)","titel":"Bestandsarten, Andler-Formel vertieft, Bestellverfahren & Lieferantenbewertung","datum":"2026-04-29T00:00:00.000Z","inhalt":"Vollständige Bestandsarten (erweitert):\n- Disponierter Bestand: reservierter Bestand oder bestellte Menge die noch nicht am Lager ist\n- Durchschnittlicher Lagerbestand: kalkulatorischer mittlerer Lagerbestand pro Periode (für Planung und Vergleich)\n- Höchstbestand: maximale Menge an Lager um hohe Lagerkosten und Kapitalbindung zu verhindern\n- Inventurbestand: durch Bestandsaufnahme (Inventur) effektiv ermittelter Mengen- oder Wertbestand\n- Lagerbestand: rechnerisch vorhandener Mengen- oder Wertbestand an Lager\n- Meldebestand: Mindestmenge bei der eine Meldung für die Beschaffung ausgelöst wird\n- Reservierter Bestand: Teilmenge des Lagerbestands der für bestimmte Zwecke gebunden ist\n- Sicherheitsbestand: Reservemenge um unvorhergesehene Angebots- oder Nachfrageschwankungen abzufedern\n- Sperrbestand: Lagerbestand der nicht entnommen werden darf (Qualitätsprüfungen)\n- Verfügbarer Bestand: Teilmenge des Lagerbestands der (theoretisch) frei verfügbar ist\n\nAndler-Formel (vertieft):\nFormel: Xopt = Wurzel(200 x M x BK / EP x LHS)\nM = Bedarfsmenge pro Periode\nBK = Auftragsfixe Bestellkosten (in CHF)\nEP = Einstandspreis pro Mengeneinheit (in CHF)\nLHS = Lagerhaltungskostensatz (in %)\nDie Zahl 200 stammt aus der Losgrössenformel nach Andler und ist eine fixe Grösse.\nBeispielrechnung: Wurzel(200 x 2000 x 120 / 15 x 8) = 632 Stück\n\nVoraussetzungen Andler-Formel:\n- Jahresverbrauch muss im Voraus bekannt sein\n- Bedarf ist über das Jahr konstant bei gleich bleibenden Zu- und Abgängen\n- Einstandspreis unabhängig von bestellter Menge (keine Rabatte) und konstant\n- Bestell- und Lagerhaltungskosten bekannt und konstant\n\nRechenweg Taschenrechner:\n1. Multipliziere 200 x Gesamtmenge p.a. x Bestellfixe Kosten (mit Prozent: 200, sonst mit 2)\n2. Multipliziere Einstandspreis x Lagerhaltungskostensatz (als Dezimalzahl, z.B. 10% = 0.10)\n3. Teile Ergebnis Zeile 1 durch Zeile 2\n4. Ziehe Wurzel\n5. Auf ganze Zahl runden\n\nBestellpunktverfahren:\nBestellpunkt = (Tagesbedarf x Beschaffungszeit) + (Tagesbedarf x Sicherheitszeit)\nVorteile: hohe Versorgungssicherheit, berücksichtigt Bedarfsschwankungen (Intervalle passen sich an)\nNachteile: hoher Kontrollaufwand, tendiert zu hohen Lagerbeständen\n\nBestellrhythmusverfahren:\nBestellmenge = (Beschaffungszeit + Überprüfungszeit) x Tagesverbrauch + Sicherheitsbestand\nVorteile: feste Zeitintervalle ermöglichen bessere Koordination, Mengenrabatte optimierbar, weniger Bestandskontrollen, Ladenhüter aufdeckbar\nNachteile: Gefahr der Unterdeckung bei unregelmässigem Bedarf, hohe Beschaffungszeiten = hohe Bestellmengen, mehr Kapital gebunden als Bestellpunktverfahren\n\nBullwhip-Effekt (Peitschenschlageffekt) – vertieft:\nKette: Vorlieferant → Lieferant → Produzent → Kunde → Kunde des Kunden → Endkunde\nUrsachen: verzerrte Weitergabe von Informationen, unabgestimmte Nachfrageprognosen, Bündelung von Aufträgen (Skaleneffekte), Bestellung grösserer Mengen aus Furcht vor Lieferengpässen\n\nFehlmengenkosten – vollständige Struktur:\n1. Zusätzliche Kosten: Logistikkosten zur Behebung, Kosten in anderen Unternehmensbereichen, Sonstige Mehrkosten (Konventionalstrafen, Schadenersatz)\n2. Reduzierte Erlöse: Erlösschmälerungen (Preisnachlässe bei Terminüberschreitung), entgehende Erlöse (Nichtabnahme bei Terminüberschreitung)\n3. Entgehende Deckungsbeiträge: Direkter Umsatzverlust (Kunde geht zur Konkurrenz), Indirekter Umsatzverlust (Ausstrahlungseffekte auf andere Kunden)\n\nLieferantenauswahl – Prozess:\n1. Lieferanten bewerten\n2. Lieferanten anfragen\n3. Angebote prüfen und verhandeln\n4. Kontraktpolitik und Vertragsabschluss\n\nBewertungskatalog Lieferanten:\nGrundsätzliche Eignung: Ausliefermöglichkeiten, Entfernung, Managementfähigkeit, Flexibilität, Gewährleistung, Image, JiT-Möglichkeit, Qualität (Zertifikate), Service, IT-Anbindung\nBeschaffungsobjekt: Lieferbedingungen, Liefertermine, Preise/Rabatte, Produktqualität, Recycling, Umweltfreundlichkeit, Zahlungsbedingungen\nWirtschaftliche Lage: F&E-Anteil, Ertragslage, Kapitalbasis, Kostenstruktur, Marktanteile, Rechtsform\n\nNutzwertanalyse – Berechnung:\nNutzwert = Gewichtung x Punkte (Erfüllungsgrad: 1=gering, 5=mittel, 10=perfekt)\nVariantenwertsumme = Summe aller Nutzwerte → höchste Summe = beste Option\nKombination mit Kosten möglich: Nutzwert / Kosten = Effizienz\n\nPräferenzmatrix:\nPaarvergleich aller Kriterien untereinander. Ergibt Gewichtung durch Nennungen/Häufigkeit.\nTotal Nennungen = n(n-1)/2 bei n Kriterien."}];

function formatInhalt(inhalt){
  // Parse into sections
  const lines=inhalt.split('\n');
  const sections=[];
  let cur=null;

  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    const t=l.trim();
    if(!t) continue;

    // Detect section header: ends with : and is short and not a list item
    const isHead = !t.startsWith('-') && !t.startsWith('•') && t.endsWith(':') && t.length<90;
    // Also detect "Word Word Word:" patterns even without newline before
    const isDefLine = t.match(/^([A-ZÜÄÖ][^:\n]{4,60}):\s*(.{5,})$/) && !t.startsWith('-');

    if(isHead){
      cur={head:t.slice(0,-1),items:[],type:'list'};
      sections.push(cur);
    } else if(!cur){
      cur={head:'',items:[t],type:'text'};
      sections.push(cur);
    } else if(t.startsWith('-')||t.startsWith('•')){
      if(cur.type!=='list'){cur={head:cur.head,items:[],type:'list'};sections.push(cur);}
      cur.items.push(t.replace(/^[-•]\s*/,''));
    } else {
      cur.items.push({raw:t});
    }
  }

  let html='<div class="lese-card">';
  sections.forEach(sec=>{
    html+='<div class="lese-section">';
    if(sec.head) html+=`<div class="lese-section-head">${esc(sec.head)}</div>`;

    if(sec.type==='list'&&sec.items.length){
      // Check if items are key:value pairs
      const allKV=sec.items.every(it=>typeof it==='string'&&it.match(/^.{3,50}[:=]\s*.{3,}/));
      const allBullet=sec.items.every(it=>typeof it==='string');
      if(allKV&&sec.items.length>=2){
        html+='<div class="lese-kv">';
        sec.items.forEach(it=>{
          const m=it.match(/^(.{3,60?})[:=]\s*(.+)$/);
          if(m){html+=`<div class="lese-key">${esc(m[1].trim())}</div><div class="lese-val">${esc(m[2].trim())}</div>`;}
          else{html+=`<div class="lese-key" style="grid-column:1/-1">${esc(it)}</div>`;}
        });
        html+='</div>';
      } else {
        html+='<ul class="lese-list">';
        sec.items.forEach(it=>{
          const s=typeof it==='string'?it:(it.raw||'');
          // Check if it has a sub-colon
          const m=s.match(/^([^:]{4,50}):\s*(.{4,})$/);
          if(m){html+=`<li><strong>${esc(m[1])}</strong>: ${esc(m[2])}</li>`;}
          else if(s.match(/^Merksatz|^Prüfung|^SMART|^Formel/i)){
            html+=`<li><span class="lese-tag">Merksatz</span>${esc(s.replace(/^Merksatz[:\s]*/i,''))}</li>`;
          } else {html+=`<li>${esc(s)}</li>`;}
        });
        html+='</ul>';
      }
    } else {
      // Text items
      sec.items.forEach(it=>{
        const s=typeof it==='string'?it:(it.raw||'');
        if(!s) return;
        // Formula?
        if(s.match(/[=×÷√%].*[0-9]|Formel:|Q\*=|RPN=/)){
          html+=`<div class="lese-formula">${esc(s)}</div>`;
        } else if(s.match(/^Merksatz:|^Prüfungsmerksatz:|^Merksatz\s/i)||s.match(/→.*→.*→/)){
          html+=`<div class="lese-merksatz">${esc(s)}</div>`;
        } else {
          html+=`<p class="lese-text" style="margin-bottom:4px">${esc(s)}</p>`;
        }
      });
    }
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function buildKarten(th){
  const src=th?DATA.filter(d=>d.thema===th):DATA;
  const cards=[];
  src.forEach(e=>{
    const lines=e.inhalt.split('\n').filter(l=>l.trim());
    lines.forEach(l=>{
      const t=l.trim();
      if(t.startsWith('-')||t.startsWith('•')) return;
      const m=t.match(/^([^:=\n]{8,70})\s*[:=]\s*(.{8,180})$/);
      if(m) cards.push({thema:e.thema,q:m[1].trim(),a:m[2].trim()});
    });
    const ab=[...e.inhalt.matchAll(/\b([A-ZÜÄÖ]{2,6})\s*[=:]\s*([^,.\n]{8,70})/g)];
    ab.forEach(m=>cards.push({thema:e.thema,q:`Wofür steht ${m[1]}?`,a:m[2].trim()}));
  });
  const u=[],s=new Set();
  cards.forEach(c=>{if(!s.has(c.q)){s.add(c.q);u.push(c)}});
  return u.slice(0,200);
}

function buildQFragen(th,max){
  const src=th?DATA.filter(d=>d.thema===th):DATA;
  const fragen=[];
  src.forEach(e=>{
    const lines=e.inhalt.split('\n').filter(l=>l.trim().length>8);
    lines.forEach(l=>{
      const t=l.trim();
      if(t.startsWith('-')||t.startsWith('•')) return;
      const m=t.match(/^([^:=\n]{8,65})\s*[:=]\s*(.{8,100})$/);
      if(!m) return;
      const kor=m[2].trim();
      const fp=lines.map(x=>{const r=x.match(/[:=]\s*(.{8,80})$/);return r?r[1].trim():null}).filter(a=>a&&a!==kor&&a.length>5).sort(()=>Math.random()-.5).slice(0,3);
      if(fp.length>=2){const opts=[kor,...fp.slice(0,3)].sort(()=>Math.random()-.5);fragen.push({type:'mc',thema:e.thema,frage:`Was beschreibt "${m[1].trim()}" am besten?`,opts,correct:kor});}
    });
    const sents=e.inhalt.match(/[A-ZÜÄÖ][^.\n!?]{25,140}[.!?]/g)||[];
    sents.slice(0,6).forEach(s=>{s=s.trim();if(s.length<25)return;
      if(Math.random()<.55) fragen.push({type:'tf',thema:e.thema,frage:s,correct:'Wahr'});
      else{const f=mutate(s);if(f&&f!==s) fragen.push({type:'tf',thema:e.thema,frage:f,correct:'Falsch'});}
    });
  });
  const u=[],s=new Set();fragen.forEach(f=>{if(!s.has(f.frage)){s.add(f.frage);u.push(f)}});
  for(let i=u.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[u[i],u[j]]=[u[j],u[i]];}
  return u.slice(0,Math.min(max,u.length));
}
function mutate(s){
  const sw=[[/Stärken/,'Schwächen'],[/Schwächen/,'Stärken'],[/Chancen/,'Risiken'],[/Risiken/,'Chancen'],[/Aufwand/,'Ertrag'],[/Ertrag/,'Aufwand'],[/Gewinn/,'Verlust'],[/intern/,'extern'],[/direkt/,'indirekt'],[/steigt/,'sinkt'],[/erhöht/,'senkt'],[/Linear/,'Degressiv'],[/Primär/,'Sekundär'],[/A-Güter/,'C-Güter'],[/Push/,'Pull'],[/EBIT/,'EBT']];
  for(const [a,b] of sw) if(a.test(s)) return s.replace(a,b);
  return null;
}

function renderQFrage(){

function ansQ(btn,chosen){

  const badge=q.type==='mc'?'<span class="qbadge qbadge-mc">Multiple Choice</span>':'<span class="qbadge qbadge-tf">Wahr / Falsch</span>';
  const opts=q.type==='mc'?q.opts:['Wahr','Falsch'];
  const m=Math.floor(eSek/60),s=eSek%60;
  document.getElementById('exam-out').innerHTML=`
<div class="exam-hdr"><div><div class="exam-title">${esc(ePruef.name)}</div><div class="exam-meta">${q.thema} · Frage ${eIdx+1} / ${eList.length}</div></div><div class="exam-timer" id="etimer">${m}:${s<10?'0'+s:s}</div></div>
<div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
${q.scenario?`<div class="scenario"><div class="scenario-lbl">Fallbeispiel</div>${esc(q.scenario)}</div>`:''}
<div class="card"><div class="qmeta">${badge}<span style="font-size:12px;color:var(--text3)">${q.thema}</span></div><div class="q-text">${esc(q.frage)}</div>
<div id="eo">${opts.map(o=>`<button class="opt" onclick="ansE(this,'${esc2(o)}')">${esc(o)}</button>`).join('')}</div><div id="efb"></div></div>`;
}
function ansE(btn,chosen){
  const q=eList[eIdx];
  document.querySelectorAll('#eo .opt').forEach(b=>{b.disabled=true;if(b.textContent===q.correct)b.classList.add('correct');else if(b.textContent===chosen&&chosen!==q.correct)b.classList.add('wrong');});
  const ok=chosen===q.correct;if(ok)eScore++;
  eAntworten.push({frage:q.frage,chosen,correct:q.correct,ok});
  const fb=document.getElementById('efb');fb.className='fb '+(ok?'fb-ok':'fb-nok');
  fb.textContent=ok?'Richtig!':'Falsch — Richtig: '+q.correct;
  setTimeout(()=>{eIdx++;renderEFrage();},1600);
}
function finishExam(){
  if(eTimer) clearInterval(eTimer);
  const pct=Math.round(eScore/eList.length*100);
  const note=pct>=85?'Ausgezeichnet (Note 6)':pct>=75?'Gut (Note 5.5)':pct>=65?'Gut (Note 5)':pct>=55?'Befriedigend (Note 4.5)':pct>=45?'Genügend (Note 4)':'Ungenügend';
  const falsch=eAntworten.filter(a=>!a.ok).slice(0,6);
  document.getElementById('exam-out').innerHTML=`<div class="card res-center">
<div class="res-ring">${pct}%</div><div class="res-label">${note}</div>
<div class="res-sub">${eScore} von ${eList.length} richtig · ${esc(ePruef.name)}</div>
<div class="stats-row"><div class="stat-box"><div class="stat-n" style="color:var(--green)">${eScore}</div><div class="stat-l">Richtig</div></div><div class="stat-box"><div class="stat-n" style="color:var(--red)">${eList.length-eScore}</div><div class="stat-l">Falsch</div></div><div class="stat-box"><div class="stat-n">${pct}%</div><div class="stat-l">Score</div></div></div>
${falsch.length?`<div style="text-align:left;margin-bottom:1.25rem"><div style="font-size:13px;font-weight:600;margin-bottom:.5rem;color:var(--red)">Falsch beantwortet:</div>${falsch.map(a=>`<div class="wrong-item"><strong>${esc(a.frage.slice(0,100))}${a.frage.length>100?'…':''}</strong><br>Richtig: <span class="corr">${esc(a.correct)}</span></div>`).join('')}</div>`:''}
<div class="btn-row"><button class="btn btn-p" onclick="startExam('${ePruef.id}')">Nochmals</button><button class="btn" onclick="go('pruef')">Zurück zur Übersicht</button></div></div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function esc2(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

init();
</script>
</body>
</html>
